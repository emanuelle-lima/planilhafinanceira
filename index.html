<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projeção Financeira</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-color:#F4F5F7; --surface:#FFFFFF; --surface-muted:#FAFBFC;
    --border:#E5E7EB; --border-strong:#D5D9E0;
    --text-color:#17181C; --text-muted:#6B7280; --text-subtle:#9AA1AC;
    --highlight:#BFF47B; --highlight-hover:#B2EE63; --highlight-strong:#6FB52E;
    --highlight-soft:rgba(191,244,123,.30); --on-highlight:#17300A;
    --error-color:#E63946; --success-color:#2A9D8F;
    --shadow-xs:0 1px 2px rgba(16,24,40,.04);
    --shadow-md:0 4px 12px rgba(16,24,40,.06),0 2px 4px rgba(16,24,40,.03);
    --shadow-lg:0 12px 32px rgba(16,24,40,.10),0 4px 8px rgba(16,24,40,.04);
    --radius-sm:8px; --radius:12px; --radius-lg:16px; --radius-xl:20px; --radius-full:999px;
    --speed:.2s;
    --font:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;background:var(--bg-color);color:var(--text-color);
    font-family:var(--font);-webkit-font-smoothing:antialiased}
  #app{width:100%}

  /* ── Hero (faixa colorida full-bleed) ── */
  .hero{background:linear-gradient(160deg,#D0F69B 0%,#BFF47B 58%,#B4F069 100%);padding:46px 0 82px}
  .hero-sm{padding:40px 0 74px}
  .hero-inner{max-width:720px;margin:0 auto;padding:0 24px}
  .hero h1{margin:0;font-size:27px;font-weight:700;letter-spacing:-.02em;color:var(--on-highlight)}
  .hero-sub{margin:6px 0 0;font-size:14px;color:rgba(23,48,10,.60)}

  /* ── Conteúdo sobe por cima da faixa ── */
  .container{max-width:720px;margin:-56px auto 0;padding:0 24px 76px}
  .container.narrow{max-width:440px}

  /* ── Painel (card principal) ── */
  .panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-xl);
    box-shadow:var(--shadow-lg)}

  .tabs{display:inline-flex;gap:4px;background:var(--surface-muted);border-radius:var(--radius-full);
    padding:4px;margin:16px 22px 12px}
  .tabs button{border:0;background:transparent;color:var(--text-muted);font-family:inherit;font-size:13.5px;
    font-weight:600;padding:8px 20px;border-radius:var(--radius-full);cursor:pointer;transition:var(--speed)}
  .tabs button.on{background:var(--highlight);color:var(--on-highlight);box-shadow:var(--shadow-xs)}

  .sheet{border-top:1px solid var(--border);padding-bottom:6px}

  .row{display:flex;align-items:center;justify-content:space-between;min-height:54px;padding:0 22px;gap:12px}
  .row + .row{border-top:1px solid var(--border)}
  .row .name{display:flex;align-items:center;gap:9px;font-size:14.5px;color:var(--text-color)}
  .lock-ic{color:var(--text-subtle);flex:none}
  .val{font-size:15px;font-variant-numeric:tabular-nums;text-align:right;color:var(--text-color)}
  /* travados: tom sobre tom, apagado */
  .row.locked .name,.row.locked .val{color:var(--text-muted)}
  /* destaque (Investimento / Lucro) vence o apagado */
  .row.strong .name{font-weight:600;color:var(--text-color)}
  .row.strong .val{font-weight:700;color:var(--text-color)}
  .val.neg{color:var(--error-color)}

  .row input{width:150px;text-align:right;font-family:inherit;font-size:15px;font-weight:600;
    font-variant-numeric:tabular-nums;color:var(--text-color);background:var(--surface-muted);
    border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 11px;transition:var(--speed)}
  .row input:hover{border-color:var(--border-strong)}
  .row input:focus{outline:none;border-color:var(--highlight-strong);box-shadow:0 0 0 3px var(--highlight-soft)}
  .unit{color:var(--text-subtle);font-size:13px}

  /* ── Ícone de informação + tooltip ── */
  .info{position:relative;display:inline-flex;align-items:center;justify-content:center;width:17px;height:17px;
    border-radius:50%;border:1.3px solid var(--border-strong);color:var(--text-subtle);font-size:10.5px;font-weight:700;
    font-style:normal;font-family:var(--font);cursor:help;flex:none;line-height:1}
  .info:hover,.info:focus{border-color:var(--highlight-strong);color:var(--highlight-strong);outline:none}
  .info .tip{position:absolute;top:calc(100% + 9px);left:-10px;transform:translateY(4px);
    width:250px;max-width:min(250px,76vw);background:var(--surface);border:1px solid var(--border);
    border-radius:var(--radius);padding:12px 14px;box-shadow:var(--shadow-md);
    opacity:0;visibility:hidden;transition:.16s;z-index:30;text-align:left}
  .info:hover .tip,.info:focus .tip{opacity:1;visibility:visible;transform:translateY(0)}
  .info .tip::after{content:"";position:absolute;bottom:100%;left:16px;
    border:6px solid transparent;border-bottom-color:var(--surface)}
  .tip-desc{display:block;font-size:12.5px;font-weight:500;font-style:normal;color:var(--text-color);line-height:1.5}
  .tip-ref{display:block;margin-top:7px;font-size:11.5px;font-style:normal;color:var(--text-subtle);line-height:1.4}

  /* ── Bloco / rótulo de seção ── */
  .block-label{font-size:13px;font-weight:600;color:var(--text-muted);margin:30px 4px 14px}
  .block-label span{color:var(--text-subtle);font-weight:500}

  /* ── Cards (projeção anual) ── */
  .cards{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);
    padding:15px 16px;box-shadow:var(--shadow-xs);text-align:center}
  .card .clbl{display:flex;align-items:center;justify-content:center;gap:6px;font-size:11px;font-weight:600;letter-spacing:.3px;
    text-transform:uppercase;color:var(--text-subtle)}
  .card .cval{margin-top:9px;font-size:19px;font-weight:700;color:var(--text-color);
    font-variant-numeric:tabular-nums;letter-spacing:-.01em}
  .card .cval.neg{color:var(--error-color)}
  .card .lock-ic{color:var(--text-subtle)}

  /* ── Login admin ── */
  .login{max-width:400px;margin:0 auto;background:var(--surface);border:1px solid var(--border);
    border-radius:var(--radius-xl);box-shadow:var(--shadow-lg);padding:30px 28px;text-align:center}
  .login h2{margin:0 0 4px;font-size:18px;font-weight:700}
  .login p{margin:0 0 20px;font-size:13.5px;color:var(--text-muted)}
  .login input{width:100%;font-family:inherit;font-size:15px;padding:12px 14px;border:1px solid var(--border);
    border-radius:var(--radius);text-align:center;background:var(--surface-muted);color:var(--text-color)}
  .login input:focus{outline:none;border-color:var(--highlight-strong);box-shadow:0 0 0 3px var(--highlight-soft)}

  .btn{font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;border:0;border-radius:var(--radius);
    background:var(--highlight);color:var(--on-highlight);padding:12px 20px;width:100%;margin-top:14px;transition:var(--speed)}
  .btn:hover{background:var(--highlight-hover)}
  .btn:disabled{opacity:.55;cursor:default}
  .btn.small{width:auto;padding:10px 22px;margin-top:0}
  .msg{font-size:13px;min-height:18px}
  .msg.ok{color:var(--success-color)} .msg.err{color:var(--error-color)}

  /* ── Admin: bloco por guia ── */
  .adm-tab{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-xl);
    box-shadow:var(--shadow-md);padding:6px 0 20px;margin-bottom:20px}
  .adm-tab h3{margin:0;padding:18px 22px 2px;font-size:17px;font-weight:700}
  .adm-tab .hint{margin:0;padding:0 22px 8px;font-size:12.5px;color:var(--text-muted)}
  .adm-tab .block-label{padding:0 22px}
  .adm-tab .cards{padding:0 22px}
  .adm-save{display:flex;align-items:center;gap:14px;padding:16px 22px 0}

  @media(max-width:640px){
    .cards{grid-template-columns:repeat(2,1fr)}
    .hero-inner,.container{padding-left:16px;padding-right:16px}
    .row input{width:130px}
  }
</style>
</head>
<body>
<div id="app"></div>

<svg style="display:none"><symbol id="ic-lock" viewBox="0 0 24 24">
  <g fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/>
  </g>
</symbol></svg>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

/* ================= Supabase ================= */
const SB_URL = 'https://iajamwjrmlnfdgfdrptl.supabase.co';
const SB_KEY = 'sb_publishable_9H21X1OwI_DXQAGpat37Bg_3AsLZEXW';
const sb = createClient(SB_URL, SB_KEY);

const IS_ADMIN = location.hostname.includes('-adm')
              || new URLSearchParams(location.search).has('admin');

/* ============ Valores padrão (fallback) ============ */
const FALLBACK = {
  mid: {cpc:0.8, conv:0.002, ticket:2500, investimento:200000},
  low: {cpc:0.8, conv:0.06,  ticket:97,   investimento:200000},
};
let CONFIG = structuredClone(FALLBACK);

async function loadConfig(){
  try{
    const {data,error} = await sb.from('config').select('*');
    if(error) throw error;
    (data||[]).forEach(r=>{
      if(CONFIG[r.tab]) CONFIG[r.tab] =
        {cpc:+r.cpc, conv:+r.conv, ticket:+r.ticket, investimento:+r.investimento};
    });
  }catch(e){ console.warn('Usando valores padrão (backend indisponível):', e.message||e); }
}

/* ================= Formatação (pt-BR) ================= */
const brl  = new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'});
const num2 = new Intl.NumberFormat('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
const int0 = new Intl.NumberFormat('pt-BR',{maximumFractionDigits:0});
function fmt(v,t){
  if(!isFinite(v)||isNaN(v)) return '—';
  if(t==='brl')  return brl.format(v);
  if(t==='num2') return num2.format(v);
  if(t==='int')  return int0.format(Math.round(v));
  if(t==='pct2') return num2.format(v*100)+'%';
  if(t==='pct0') return Math.round(v*100)+'%';
  return v;
}
const dv=(a,b)=> b? a/b : 0;
function parseNum(s){ s=(''+s).replace(/[^\d,.-]/g,'').replace(/\./g,'').replace(',','.');
  const n=parseFloat(s); return isNaN(n)?0:n; }

/* Abreviação k / M para a projeção anual (ex.: 1.000 → 1k · 3.500 → 3,5k · 1.000.000 → 1M) */
function abbrevNum(v){
  const neg=v<0; let n=Math.abs(v), out;
  const t=x=>(Math.round(x*10)/10).toLocaleString('pt-BR',{maximumFractionDigits:1});
  if(n>=1e6)      out=t(n/1e6)+'M';
  else if(n>=1e3) out=t(n/1e3)+'k';
  else            out=t(n);
  return (neg?'-':'')+out;
}
function fmtAnnual(v,type){
  if(!isFinite(v)||isNaN(v)) return '—';
  if(type==='pct0') return Math.round(v*100)+'%';
  if(type==='pct2') return num2.format(v*100)+'%';
  const s=abbrevNum(v);
  return type==='brl' ? 'R$ '+s : s;
}

/* ================= Fórmulas (idênticas à planilha) ================= */
function calc(v){
  const cpc=+v.cpc||0, conv=+v.conv||0, inv=+v.investimento||0, ticket=+v.ticket||0;
  const clique = dv(inv, cpc);   // Investimento / CPC
  const venda  = clique*conv;    // Clique × Taxa de conversão
  const fat    = ticket*venda;   // Ticket × Venda
  const cpa    = dv(inv, venda); // Investimento / Venda
  const lucro  = fat-inv;        // Faturamento − Investimento
  return {cpc,clique,conv,venda,fat,inv,cpa,lucro,ticket};
}

/* ================= Metadados ================= */
const INFO = {
  cpc:    {desc:'É o valor pago cada vez que um usuário clica no seu anúncio.',
           ref:'Referência de mercado: abaixo de R$ 3,00'},
  cpa:    {desc:'Quanto foi investido em anúncios para conseguir uma venda / cliente.',
           ref:''},
  ticket: {desc:'É o preço do seu produto / oferta.',
           ref:'Low ticket: R$ 37 a R$ 97  ·  Mid ticket: R$ 197 a R$ 497'},
};
function infoIcon(key){
  const i=INFO[key]; if(!i) return '';
  return `<span class="info" tabindex="0">i<span class="tip">`+
    `<span class="tip-desc">${i.desc}</span>`+
    (i.ref?`<span class="tip-ref">${i.ref}</span>`:'')+`</span></span>`;
}
const lockSvg = `<svg class="lock-ic" width="14" height="14"><use href="#ic-lock"/></svg>`;

// kind: input (editável) | calc (resultado, com cadeado) ; fmt: brl | num2 | pct2 | int
const ROWS = [
  {key:'ticket',label:'Ticket / Preço',    kind:'input', fmt:'brl',  info:'ticket'},
  {key:'inv',   label:'Investimento',      kind:'input', fmt:'brl',  strong:true},
  {key:'conv',  label:'Taxa de conversão', kind:'input', fmt:'pct2'},
  {key:'cpc',   label:'CPC',               kind:'input', fmt:'brl',  info:'cpc'},
  {key:'clique',label:'Clique',            kind:'calc',  fmt:'num2'},
  {key:'venda', label:'Venda',             kind:'calc',  fmt:'int'},
  {key:'cpa',   label:'CPA / CAC',         kind:'calc',  fmt:'brl',  info:'cpa'},
  {key:'fat',   label:'Faturamento',       kind:'calc',  fmt:'brl'},
  {key:'lucro', label:'Lucro',             kind:'calc',  fmt:'brl',  strong:true},
];
const ANNUAL = [
  {key:'fat',    label:'Faturamento no ano', fmt:'brl',  sum:true},
  {key:'inv',    label:'Investimento no ano',fmt:'brl',  sum:true},
  {key:'lucro',  label:'Lucro / Saldo',      fmt:'brl',  sum:true, neg:true},
  {key:'venda',  label:'Vendas no ano',      fmt:'int',  sum:true},
  {key:'clique', label:'Total de cliques',   fmt:'num2', sum:true},
  {key:'cpc',    label:'CPC médio',          fmt:'brl'},
  {key:'conv',   label:'Taxa de conv. média',fmt:'pct0'},
  {key:'cpa',    label:'CPA médio',          fmt:'brl'},
];

const app = document.getElementById('app');
const wkeyOf = rkey => rkey==='inv' ? 'investimento' : rkey;

/* =======================================================================
   PÁGINA PRINCIPAL
======================================================================= */
let curTab='mid', work={};

function renderMain(){
  app.innerHTML =
    `<div class="hero">
       <div class="hero-inner">
         <h1>Projeção Financeira</h1>
         <p class="hero-sub">Simulador de tráfego pago</p>
       </div>
     </div>
     <div class="container">
       <div class="panel">
         <div class="tabs" id="tabs">
           <button data-tab="mid">Mid Ticket</button>
           <button data-tab="low">Low Ticket</button>
         </div>
         <div class="sheet" id="sheet"></div>
       </div>
       <div class="block-label">Projeção anual <span>· 12 meses</span></div>
       <div class="cards" id="cards"></div>
     </div>`;
  app.querySelectorAll('#tabs button').forEach(b=>
    b.addEventListener('click',()=>selectTab(b.dataset.tab)));
  buildCards();
  selectTab('mid');
}

function selectTab(tab){
  curTab=tab;
  work={...CONFIG[tab]};
  app.querySelectorAll('#tabs button').forEach(b=>b.classList.toggle('on',b.dataset.tab===tab));
  buildSheet();
  recalcMain();
}

function buildSheet(){
  const box=document.getElementById('sheet'); box.innerHTML='';
  ROWS.forEach(r=>{
    const isInput = r.kind==='input';
    const row=document.createElement('div');
    row.className='row '+(!isInput?'locked ':'')+(r.strong?'strong':'');
    const lock = !isInput ? lockSvg : '';
    const info = r.info ? infoIcon(r.info) : '';
    let right;
    if(isInput){
      const raw=work[wkeyOf(r.key)];
      const shown = r.fmt==='pct2' ? num2.format(raw*100) : num2.format(raw);
      const unit  = r.fmt==='pct2' ? '<span class="unit">%</span>' : '';
      right=`<span style="display:flex;align-items:center;gap:5px">`+
        `<input type="text" value="${shown}" data-rkey="${r.key}" data-fmt="${r.fmt}">${unit}</span>`;
    }else{
      right=`<span class="val" data-out="${r.key}">—</span>`;
    }
    row.innerHTML=`<span class="name">${lock}${r.label}${info}</span>${right}`;
    box.appendChild(row);
  });
  box.querySelectorAll('.row input').forEach(inp=>{
    inp.addEventListener('input',onMainInput);
    inp.addEventListener('focus',e=>e.target.select());
    inp.addEventListener('blur',onMainBlur);
  });
}
function onMainInput(e){
  const f=e.target.dataset.fmt;
  let v=parseNum(e.target.value);
  if(f==='pct2') v=v/100;
  work[wkeyOf(e.target.dataset.rkey)]=v;
  recalcMain();
}
function onMainBlur(e){
  const f=e.target.dataset.fmt, raw=work[wkeyOf(e.target.dataset.rkey)];
  e.target.value = f==='pct2' ? num2.format(raw*100) : num2.format(raw);
}

function buildCards(){
  const box=document.getElementById('cards'); box.innerHTML='';
  ANNUAL.forEach(a=>{
    const c=document.createElement('div'); c.className='card';
    c.innerHTML=`<div class="clbl">${lockSvg.replace(/14/g,'12')}${a.label}</div>`+
                `<div class="cval" data-card="${a.key}">—</div>`;
    box.appendChild(c);
  });
}

function recalcMain(){
  const m=calc(work);
  ROWS.filter(r=>r.kind!=='input').forEach(r=>{
    const el=document.querySelector(`[data-out="${r.key}"]`);
    if(el){ el.textContent=fmt(m[r.key],r.fmt);
      if(r.key==='lucro') el.classList.toggle('neg',m.lucro<0); }
  });
  ANNUAL.forEach(a=>{
    const el=document.querySelector(`[data-card="${a.key}"]`);
    if(!el) return;
    const v=a.sum? m[a.key]*12 : m[a.key];
    el.textContent=fmtAnnual(v,a.fmt); el.title=fmt(v,a.fmt);
    if(a.neg) el.classList.toggle('neg',v<0);
  });
}

/* =======================================================================
   PÁGINA ADMIN
======================================================================= */
let adminPass=null;
const admState={};
const TAB_NAME={mid:'Mid Ticket', low:'Low Ticket'};

function renderAdminLogin(){
  app.innerHTML=
    `<div class="hero hero-sm">
       <div class="hero-inner">
         <h1>Projeção Financeira</h1>
         <p class="hero-sub">Área do administrador</p>
       </div>
     </div>
     <div class="container narrow">
       <div class="login">
         <h2>Acesso restrito</h2>
         <p>Digite a senha de administrador</p>
         <input id="pass" type="password" placeholder="Senha" autocomplete="current-password">
         <button class="btn" id="enter">Entrar</button>
         <div class="msg" id="loginMsg"></div>
       </div>
     </div>`;
  const pass=document.getElementById('pass');
  const msg=document.getElementById('loginMsg');
  const enter=document.getElementById('enter');
  async function tryLogin(){
    const val=pass.value.trim();
    if(!val) return;
    enter.disabled=true; msg.className='msg'; msg.textContent='Verificando…';
    try{
      const {data,error}=await sb.rpc('check_password',{p_password:val});
      if(error) throw error;
      if(data===true){ adminPass=val; await loadConfig(); renderAdminPanel(); return; }
      msg.className='msg err'; msg.textContent='Senha incorreta.';
    }catch(e){
      msg.className='msg err';
      msg.textContent='Backend não configurado ainda. Rode o SQL no Supabase.';
      console.warn(e);
    }
    enter.disabled=false;
  }
  enter.addEventListener('click',tryLogin);
  pass.addEventListener('keydown',e=>{ if(e.key==='Enter') tryLogin(); });
  pass.focus();
}

function renderAdminPanel(){
  app.innerHTML=
    `<div class="hero hero-sm">
       <div class="hero-inner">
         <h1>Projeção Financeira</h1>
         <p class="hero-sub">Admin · valores padrão de cada guia</p>
       </div>
     </div>
     <div class="container"><div id="admTabs"></div></div>`;
  const host=document.getElementById('admTabs');
  ['mid','low'].forEach(tab=>{
    admState[tab]={...CONFIG[tab]};
    host.appendChild(buildAdminTab(tab));
  });
}

function buildAdminTab(tab){
  const wrap=document.createElement('div'); wrap.className='adm-tab';
  wrap.innerHTML=
    `<h3>${TAB_NAME[tab]}</h3>
     <p class="hint">Campos de entrada editáveis; os demais são resultado das fórmulas.</p>
     <div class="sheet" data-sheet="${tab}"></div>
     <div class="block-label" style="margin:20px 0 12px">Projeção anual <span>· 12 meses</span></div>
     <div class="cards" data-cards="${tab}"></div>
     <div class="adm-save">
       <button class="btn small" data-save="${tab}">Salvar</button>
       <span class="msg" id="msg-${tab}"></span>
     </div>`;
  setTimeout(()=>{
    buildAdminSheet(tab);
    wrap.querySelector(`[data-save="${tab}"]`).addEventListener('click',()=>saveTab(tab));
  });
  return wrap;
}

function buildAdminSheet(tab){
  const box=document.querySelector(`[data-sheet="${tab}"]`); if(!box) return;
  box.innerHTML='';
  ROWS.forEach(r=>{
    const isInput=r.kind==='input';
    const row=document.createElement('div');
    row.className='row '+(!isInput?'locked ':'')+(r.strong?'strong':'');
    const lock=!isInput?lockSvg:'';
    const info=r.info?infoIcon(r.info):'';
    let right;
    if(isInput){
      const raw=admState[tab][wkeyOf(r.key)];
      const shown=r.fmt==='pct2'?num2.format(raw*100):num2.format(raw);
      const unit =r.fmt==='pct2'?'<span class="unit">%</span>':'';
      right=`<span style="display:flex;align-items:center;gap:5px">`+
        `<input type="text" value="${shown}" data-rkey="${r.key}" data-fmt="${r.fmt}">${unit}</span>`;
    }else{
      right=`<span class="val" data-aout="${tab}-${r.key}">—</span>`;
    }
    row.innerHTML=`<span class="name">${lock}${r.label}${info}</span>${right}`;
    box.appendChild(row);
  });
  box.querySelectorAll('input').forEach(inp=>{
    inp.addEventListener('input',()=>{
      const f=inp.dataset.fmt; let v=parseNum(inp.value); if(f==='pct2') v=v/100;
      admState[tab][wkeyOf(inp.dataset.rkey)]=v; recalcAdmin(tab);
    });
    inp.addEventListener('focus',e=>e.target.select());
    inp.addEventListener('blur',()=>{
      const f=inp.dataset.fmt, raw=admState[tab][wkeyOf(inp.dataset.rkey)];
      inp.value=f==='pct2'?num2.format(raw*100):num2.format(raw);
    });
  });
  const cbox=document.querySelector(`[data-cards="${tab}"]`); cbox.innerHTML='';
  ANNUAL.forEach(a=>{
    const c=document.createElement('div'); c.className='card';
    c.innerHTML=`<div class="clbl">${lockSvg.replace(/14/g,'12')}${a.label}</div>`+
                `<div class="cval" data-acard="${tab}-${a.key}">—</div>`;
    cbox.appendChild(c);
  });
  recalcAdmin(tab);
}

function recalcAdmin(tab){
  const m=calc(admState[tab]);
  ROWS.filter(r=>r.kind!=='input').forEach(r=>{
    const el=document.querySelector(`[data-aout="${tab}-${r.key}"]`);
    if(el){ el.textContent=fmt(m[r.key],r.fmt); if(r.key==='lucro') el.classList.toggle('neg',m.lucro<0); }
  });
  ANNUAL.forEach(a=>{
    const el=document.querySelector(`[data-acard="${tab}-${a.key}"]`);
    if(!el) return;
    const v=a.sum?m[a.key]*12:m[a.key];
    el.textContent=fmtAnnual(v,a.fmt); el.title=fmt(v,a.fmt);
    if(a.neg) el.classList.toggle('neg',v<0);
  });
}

async function saveTab(tab){
  const v=admState[tab];
  const btn=document.querySelector(`[data-save="${tab}"]`);
  const msg=document.getElementById('msg-'+tab);
  btn.disabled=true; msg.className='msg'; msg.textContent='Salvando…';
  try{
    const {error}=await sb.rpc('update_config',{
      p_password:adminPass, p_tab:tab,
      p_cpc:v.cpc, p_conv:v.conv, p_ticket:v.ticket, p_investimento:v.investimento});
    if(error) throw error;
    CONFIG[tab]={...v};
    msg.className='msg ok'; msg.textContent='✓ Salvo — já vale na página principal.';
  }catch(e){
    msg.className='msg err'; msg.textContent='Erro ao salvar: '+(e.message||e);
  }
  btn.disabled=false;
}

/* ================= Início ================= */
(async ()=>{
  if(IS_ADMIN){ renderAdminLogin(); }
  else { await loadConfig(); renderMain(); }
})();
</script>
